<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoresearch Dashboard — supabase skill</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a2e; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
  .status-bar { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; display: flex; gap: 32px; align-items: center; }
  .stat { }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
  .stat-value { font-size: 1.4rem; font-weight: 700; }
  .stat-value.green { color: #16a34a; }
  .stat-value.blue { color: #2563eb; }
  .status-pill { margin-left: auto; padding: 6px 14px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
  .status-pill.running { background: #dbeafe; color: #1d4ed8; }
  .status-pill.complete { background: #dcfce7; color: #15803d; }
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; }
  .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; color: #888; font-weight: 500; padding: 0 8px 10px 0; border-bottom: 1px solid #f1f5f9; }
  td { padding: 8px 8px 8px 0; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.72rem; font-weight: 600; }
  .badge.baseline { background: #dbeafe; color: #1d4ed8; }
  .badge.keep { background: #dcfce7; color: #15803d; }
  .badge.discard { background: #fee2e2; color: #dc2626; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: #6366f1; transition: width 0.4s; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>🧪 Autoresearch — <code>supabase</code> skill</h1>
<p class="subtitle">Auto-refreshes every 10s · reads results.json</p>

<div class="status-bar">
  <div class="stat"><div class="stat-label">Baseline</div><div class="stat-value" id="baseline">—</div></div>
  <div class="stat"><div class="stat-label">Best Score</div><div class="stat-value green" id="best">—</div></div>
  <div class="stat"><div class="stat-label">Experiments</div><div class="stat-value blue" id="exp-count">—</div></div>
  <div class="stat"><div class="stat-label">Max Score</div><div class="stat-value" id="max-score">—</div></div>
  <div class="status-pill running" id="status-pill">Loading…</div>
</div>

<div class="grid">
  <div class="card">
    <h2>Score Progression</h2>
    <canvas id="chart" height="160"></canvas>
  </div>
  <div class="card">
    <h2>Eval Breakdown</h2>
    <div id="eval-breakdown"></div>
  </div>
</div>

<div class="card">
  <h2>Experiment Log</h2>
  <table>
    <thead><tr><th>#</th><th>Score</th><th>Pass Rate</th><th>Status</th><th>Description</th></tr></thead>
    <tbody id="exp-table"></tbody>
  </table>
</div>

<script>
let chart;

async function load() {
  const res = await fetch('results.json?t=' + Date.now());
  const d = await res.json();

  const maxScore = d.experiments[0]?.max_score ?? 25;
  document.getElementById('baseline').textContent = d.baseline_score.toFixed(1) + '%';
  document.getElementById('best').textContent = d.best_score.toFixed(1) + '%';
  document.getElementById('exp-count').textContent = d.experiments.length;
  document.getElementById('max-score').textContent = maxScore;

  const pill = document.getElementById('status-pill');
  if (d.status === 'complete') {
    pill.textContent = '✅ Complete';
    pill.className = 'status-pill complete';
  } else {
    pill.textContent = `▶ Exp ${d.current_experiment}…`;
    pill.className = 'status-pill running';
  }

  // Chart
  const labels = d.experiments.map(e => `#${e.id}`);
  const data = d.experiments.map(e => e.pass_rate);
  const colors = d.experiments.map(e =>
    e.status === 'baseline' ? '#2563eb' : e.status === 'keep' ? '#16a34a' : '#dc2626'
  );

  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'line',
      data: { labels, datasets: [{ data, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.08)', tension: 0.3, pointBackgroundColor: colors, pointRadius: 6 }] },
      options: { plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: { callback: v => v + '%' } } } }
    });
  } else {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.data.datasets[0].pointBackgroundColor = colors;
    chart.update();
  }

  // Evals
  const evalDiv = document.getElementById('eval-breakdown');
  evalDiv.innerHTML = d.eval_breakdown.map(e => {
    const pct = Math.round((e.pass_count / e.total) * 100);
    return `<div style="margin-bottom:12px">
      <div style="font-size:0.78rem;margin-bottom:4px;color:#444">${e.name}</div>
      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span style="font-size:0.75rem;color:#888;min-width:32px">${pct}%</span>
      </div>
    </div>`;
  }).join('');

  // Table
  const tbody = document.getElementById('exp-table');
  tbody.innerHTML = d.experiments.map(e => `
    <tr>
      <td>${e.id}</td>
      <td>${e.score}/${e.max_score}</td>
      <td>${e.pass_rate.toFixed(1)}%</td>
      <td><span class="badge ${e.status}">${e.status}</span></td>
      <td style="color:#555">${e.description}</td>
    </tr>
  `).join('');
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
